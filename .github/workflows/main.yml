name: Daily Job Hunt Scraper

on:
  schedule:
    - cron: '30 4 * * *'  # 10:00 AM IST
  workflow_dispatch:

jobs:
  scrape_jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "numpy<2.0" pandas python-jobspy openpyxl

      - name: Run Job Scraper
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: python vikrant_job_agent.py

      - name: Upload Job Results
        uses: actions/upload-artifact@v4
        with:
          name: daily-job-matches
          path: |
            jobs.csv
            jobs.xlsx
          retention-days: 7
